!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{width:920px;max-width:95%;padding:25px;border:2px solid #ff7ac8;border-radius:25px;box-shadow:0 0 25px #ff7ac8;background:#181818}
h1{color:#ff8ccc;font-size:48px;margin:0} .sub{font-style:italic;margin-bottom:25px;color:#ffd6ea}
.grid{display:grid;grid-template-columns:220px repeat(7,1fr) 130px;border-top:1px solid #444;border-left:1px solid #333}
.cell{padding:14px;border-right:1px solid #333;border-bottom:1px solid #333;text-align:center}
.habit{text-align:left}.small{color:#ff9dcc;font-size:14px}
.circle{width:34px;height:34px;border:2px solid #ff8ccc;border-radius:50%;margin:auto;cursor:pointer}
.circle.done{background:#ff70b8;box-shadow:0 0 14px #ff70b8}
.circle.done:after{content:"✓";font-size:25px;font-weight:bold}
.progress{color:#ff9dcc}.quote{text-align:center;margin-top:20px;color:#ffc1df;font-size:22px}
</style>
</head>
<body>
<div class="card">
<h1>Habit Tracker</h1>
<div class="sub">little by little, a little becomes a lot ♡</div>
<div class="grid" id="grid"></div>
<div class="quote">discipline today, freedom tomorrow ✨</div>
</div>

<script>
const habits=[
["💧 Drink Water","8 glasses"],
["🏋🏽 Workout","move my body"],
["📖 Bible Time","grow my faith"],
["📚 LSAT Study","1% better"],
["🥗 Eat Healthy","fuel my body"],
["🙏 Prayer","covered by God"],
["💖 Gratitude","thankful heart"]
];
const days=["M","T","W","T","F","S","S"];
const key="pinkHabitTrackerV1";
let data=JSON.parse(localStorage.getItem(key)||"{}");

function save(){localStorage.setItem(key,JSON.stringify(data));}
function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";
["HABIT ♡",...days,"PROGRESS"].forEach(x=>{
let d=document.createElement("div");d.className="cell";d.style.color="#ff8ccc";d.innerHTML=x;grid.appendChild(d);
});
habits.forEach((h,i)=>{
let habit=document.createElement("div");habit.className="cell habit";habit.innerHTML=`<b>${h[0]}</b><br><span class="small">${h[1]}</span>`;grid.appendChild(habit);
let count=0;
days.forEach((day,j)=>{
let c=document.createElement("div");c.className="cell";
let circle=document.createElement("div");circle.className="circle";
let id=i+"-"+j;
if(data[id]){circle.classList.add("done");count++;}
circle.onclick=()=>{data[id]=!data[id];save();render();}
c.appendChild(circle);grid.appendChild(c);
});
let pct=Math.round((count/7)*100);
let p=document.createElement("div");p.className="cell progress";p.innerHTML=`${pct}%<br>${"💗".repeat(count)}${"♡".repeat(7-count)}`;grid.appendChild(p);
});
}
render();
</script>
</body>
</html>
